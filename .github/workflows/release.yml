name: Update Homebrew Tap

on:
  release:
    types: [published]

jobs:
  update-homebrew:
    runs-on: ubuntu-latest
    steps:
      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download release archive
        run: |
          VERSION=${{ steps.version.outputs.version }}
          curl -sLO "https://github.com/stuffbucket/claudeme/releases/download/v${VERSION}/Claudeme-${VERSION}.zip"
          SHA256=$(shasum -a 256 "Claudeme-${VERSION}.zip" | cut -d' ' -f1)
          echo "SHA256=$SHA256" >> $GITHUB_ENV

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: stuffbucket/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Create Casks directory if needed
        run: mkdir -p homebrew-tap/Casks

      - name: Update cask
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SHA256: ${{ env.SHA256 }}
        run: |
          cat > homebrew-tap/Casks/claudeme.rb << CASKEOF
          cask "claudeme" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "https://github.com/stuffbucket/claudeme/releases/download/v#{version}/Claudeme-#{version}.zip"
            name "Claudeme"
            name "Open in Claude Code"
            desc "Finder toolbar app to launch Claude Code in the current directory"
            homepage "https://github.com/stuffbucket/claudeme"

            app "Open in Claude Code.app"

            caveats <<~EOS
              To use Claudeme:
              1. Hold ⌘ and drag the app from /Applications to Finder's toolbar
              2. Navigate to any project folder
              3. Click the toolbar icon to open Claude Code there

              Double-click the app to access Settings.
            EOS
          end
          CASKEOF
          # Strip leading indentation
          sed -i 's/^          //' homebrew-tap/Casks/claudeme.rb

      - name: Commit and push
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/claudeme.rb
          git commit -m "Update claudeme to v${{ steps.version.outputs.version }}"
          git push
